name: Streamlit CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'aficare-agent/**'
      - '.github/workflows/streamlit.yml'
  pull_request:
    branches: [main]
    paths:
      - 'aficare-agent/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'aficare-agent/requirements.txt'

      - name: Install dependencies
        run: |
          cd aficare-agent
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run linting
        run: |
          pip install flake8
          cd aficare-agent
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Test imports
        run: |
          cd aficare-agent
          python -c "import streamlit; print('Streamlit OK')"
          python -c "from src.core.agent import AfiCareAgent; print('Agent OK')" || echo "Agent import skipped"

  deploy-render:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        if: env.RENDER_API_KEY != ''
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            || echo "Render deployment skipped - no API key configured"
