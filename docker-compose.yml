version: "3.9"

# ── AfiCare MediLink — Local development stack ────────────────
# Services:
#   flutter-web  — Flutter web app served by Nginx (port 8080)
#   agent        — Python/Streamlit AI agent (port 8501)
#
# Usage:
#   docker compose up --build          # start everything
#   docker compose up flutter-web      # frontend only
#   docker compose up agent            # agent only
#   docker compose down                # stop all
#
# Environment:
#   Copy .env.example to .env and fill in your Supabase credentials.
# ──────────────────────────────────────────────────────────────

services:

  # ── Flutter Web ──────────────────────────────────────────────
  flutter-web:
    build:
      context: ./aficare_flutter
      dockerfile: Dockerfile
    container_name: aficare-flutter-web
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "com.aficare.service=flutter-web"

  # ── AI Agent (Streamlit) ─────────────────────────────────────
  agent:
    build:
      context: ./aficare-agent
      dockerfile: Dockerfile
    container_name: aficare-agent
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Override individual vars here if needed
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "com.aficare.service=agent"

networks:
  default:
    name: aficare-network
